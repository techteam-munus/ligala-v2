version: 1
applications:
  - appRoot: apps/web
    frontend:
      phases:
        preBuild:
          commands:
            - corepack enable
            - corepack prepare pnpm@9.12.0 --activate
            - cd ../..
            - pnpm install --frozen-lockfile
            - cd apps/web
        build:
          commands:
            - pnpm build
            # Standalone output puts the server bundle in
            # .next/standalone/apps/web/ alongside the workspace-root
            # node_modules at .next/standalone/. The Next standalone server
            # reads .next/static + public from its own working dir, so we
            # mirror them inside the per-app standalone dir.
            - cp -r .next/static .next/standalone/apps/web/.next/static
            - if [ -d public ]; then cp -r public .next/standalone/apps/web/public; fi
      artifacts:
        baseDirectory: .next
        files:
          - "**/*"
      cache:
        paths:
          - ../../node_modules/**/*
          - .next/cache/**/*
