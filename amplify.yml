version: 1
applications:
  - appRoot: apps/web
    frontend:
      phases:
        preBuild:
          commands:
            - corepack enable
            - corepack prepare pnpm@9.12.0 --activate
            - cd ../..
            - pnpm install --frozen-lockfile
            - cd apps/web
        build:
          commands:
            - pnpm build
            # Standalone output with outputFileTracingRoot puts node_modules
            # at .next/standalone/ and the server entry at
            # .next/standalone/apps/web/server.js. Amplify Hosting expects the
            # entry at the artifact root, so we (a) seed the per-app .next dir
            # with the static assets the server serves, (b) hoist the apps/web
            # contents up to .next/standalone/.
            - cp -r .next/static .next/standalone/apps/web/.next/static
            - if [ -d public ]; then cp -r public .next/standalone/apps/web/public; fi
            - mv .next/standalone/apps/web/.next .next/standalone/.next
            - mv .next/standalone/apps/web/server.js .next/standalone/server.js
            - mv .next/standalone/apps/web/package.json .next/standalone/package.json
            - if [ -d .next/standalone/apps/web/public ]; then mv .next/standalone/apps/web/public .next/standalone/public; fi
            - rm -rf .next/standalone/apps
      artifacts:
        baseDirectory: .next/standalone
        files:
          - "**/*"
      cache:
        paths:
          - ../../node_modules/**/*
          - .next/cache/**/*
