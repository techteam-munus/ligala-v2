# Local dev stack — Postgres + Redis.
# Versions track the production targets:
#   Postgres 16  -> Aurora Serverless v2 (Postgres 16)
#   Redis 7      -> ElastiCache (Redis 7)
#
# Bring up:   docker compose up -d
# Tear down:  docker compose down            (keeps data volumes)
# Wipe data:  docker compose down -v         (drops volumes)

name: ligala-v2

services:
  postgres:
    image: postgres:16-alpine
    container_name: ligala-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ligala
      POSTGRES_PASSWORD: ligala
      POSTGRES_DB: ligala_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ligala -d ligala_dev"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: ligala-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
  redisdata:
